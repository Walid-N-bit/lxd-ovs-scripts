name: new-profile
description: ""
config:
  user.network-config: |
    version: 2
    ethernets:
      eth0:
        dhcp4: false
        dhcp6: false
      eth1:
        addresses: [lxdbr0_ip.eth1_host/lxdbr0_netmask]
        dhcp4: false
        dhcp6: false
        nameservers:
          addresses: [130.231.240.1, 130.231.240.7]
        routes:
          - to: default
            via: lxdbr0_ip.1
    vlans:
      vlan_iface:
        id: vlan_id
        link: eth0
        addresses: [10.0.vlan_id.vlan_host/24]
        nameservers:
          addresses: [130.231.240.1, 130.231.240.7]
devices:
  data:
    path: /root/data/
    source: /home/walid/lxd-ovs-scripts/compressed_images_wheat/
    type: disk
  eth0:
    nictype: bridged
    parent: ovs_br
    type: nic
  eth1:
    nictype: bridged
    parent: lxdbr0
    type: nic
  gpu:
    type: gpu
  root:
    path: /
    pool: default-LXDPool
    size: 30GiB
    type: disk
used_by:

project: default